# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      run: bun oxlint --fix {staged_files}
      stage_fixed: true
    - name: oxfmt
      run: bun oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
